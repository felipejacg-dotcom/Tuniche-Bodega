services:
  - type: web
    name: tuniche-bodega
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT --timeout 30 --log-level info
    envVars:
      - key: DB_HOST
        value: gateway01.us-east-1.prod.aws.tidbcloud.com
      - key: DB_PORT
        value: "4000"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME_TUNICHE
        value: bodega_tuniche_real
      - key: DB_NAME_PUQUILLAY
        value: bodega_puquillay_real
      - key: SECRET_KEY
        generateValue: true
      - key: LOGIN_USERS
        value: admin:admin123,bodega:123456
      - key: ADMIN_PASSWORD
        value: tuniche2026
      - key: FLASK_DEBUG
        value: "0"

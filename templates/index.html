<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bodega Tuniche - Escáner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        :root { --bg-primary: #0a0e17; --bg-card: rgba(17, 24, 39, 0.7); --accent-indigo: #6366f1; --accent-emerald: #10b981; --accent-amber: #f59e0b; --accent-red: #ef4444; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-primary); color: #f1f5f9; min-height: 100vh; }
        #loginScreen { position: fixed; inset: 0; background: var(--bg-primary); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-container { background: var(--bg-card); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 30px; width: 100%; max-width: 380px; text-align: center; }
        .form-input, .login-select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; margin-bottom: 15px; outline: none; }
        .btn-main { width: 100%; padding: 14px; border-radius: 10px; border: none; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; font-weight: 800; }
        .glass-card { background: var(--bg-card); border-radius: 16px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .laser-box { width: 100%; padding: 20px; border: 2px dashed var(--accent-indigo); border-radius: 12px; background: rgba(99, 102, 241, 0.05); text-align: center; font-weight: 800; color: var(--accent-indigo); }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; }
        .result-box { padding: 15px; border-radius: 10px; font-weight: 700; margin-top: 10px; display: none; }
        .mode-salida { border-left: 5px solid var(--accent-amber); }
        .mode-devolucion { border-left: 5px solid var(--accent-emerald); }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-container">
        <h2 style="font-weight:800; margin-bottom:20px;">SGB Móvil</h2>
        <div id="loginError" style="color:var(--accent-red); margin-bottom:10px;"></div>
        <select id="loginPlanta" class="login-select">
            <option value="TUNICHE">Tuniche Fruits (Central)</option>
            <option value="PUQUILLAY">Puquillay</option>
        </select>
        <input type="text" id="loginUser" class="form-input" placeholder="Usuario">
        <input type="password" id="loginPass" class="form-input" placeholder="Contraseña">
        <button class="btn-main" onclick="iniciarSesion()">INGRESAR AL SISTEMA</button>
    </div>
</div>

<div id="appContent" style="display:none; padding: 15px;">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div><h4 class="mb-0" style="font-weight:800;">Tuniche Móvil</h4><small id="lblPlanta" style="color:var(--accent-indigo); font-weight:700;"></small></div>
        <button class="btn btn-sm btn-outline-danger" onclick="cerrarSesion()">Salir</button>
    </div>

    <div class="glass-card d-flex justify-content-between align-items-center" id="cardModo">
        <span id="txtModo" style="font-weight:800; color:var(--accent-amber);">MODO: SALIDA 📤</span>
        <div class="form-check form-switch">
            <input class="form-check-switch" type="checkbox" id="toggleModo" onchange="cambiarModo()" style="width:50px; height:25px;">
        </div>
    </div>

    <div class="glass-card">
        <label style="font-size:0.8rem; color:#64748b; font-weight:700;">DATOS TRABAJADOR</label>
        <input type="text" id="rut" class="form-input" placeholder="RUT o escanee carnet">
        <input type="text" id="trabajador" class="form-input" placeholder="Nombre completo">
        <select id="area" class="form-input">
            <option value="" disabled selected>Seleccione Área...</option>
            {% for area in areas %}<option value="{{ area }}">{{ area }}</option>{% endfor %}
        </select>
    </div>

    <div class="glass-card">
        <ul class="nav nav-pills nav-fill mb-3" id="pills-tab">
            <li class="nav-item"><button class="nav-link active" onclick="activarLaser()">Pistola Láser</button></li>
            <li class="nav-item"><button class="nav-link" onclick="activarCamara()">Cámara QR</button></li>
        </ul>
        <div id="sec_laser"><input type="text" id="laser_input" class="laser-box" placeholder="[ DISPARA AQUÍ ]" autocomplete="off"></div>
        <div id="sec_camara" style="display:none;"><div id="reader"></div></div>
        <div id="resultado" class="result-box text-center"></div>
    </div>
</div>

<script>
    let CREDENCIALES = { user: "", pass: "", planta: "" };
    let scanner = null;
    let isProcessing = false;

    window.onload = () => {
        const session = localStorage.getItem('sgb_session');
        if (session) { CREDENCIALES = JSON.parse(session); desbloquearApp(); }
    };

    function iniciarSesion() {
        const u = document.getElementById('loginUser').value, p = document.getElementById('loginPass').value, pl = document.getElementById('loginPlanta').value;
        fetch('/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username:u, password:p}) })
        .then(r => r.json()).then(data => {
            if(data.success) { CREDENCIALES = {user:u, pass:p, planta:pl}; localStorage.setItem('sgb_session', JSON.stringify(CREDENCIALES)); desbloquearApp(); }
            else document.getElementById('loginError').innerText = "❌ Datos incorrectos";
        });
    }

    function desbloquearApp() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appContent').style.display = 'block';
        document.getElementById('lblPlanta').innerText = CREDENCIALES.planta;
        activarLaser();
    }

    function cerrarSesion() { localStorage.removeItem('sgb_session'); location.reload(); }

    function cambiarModo() {
        const t = document.getElementById('toggleModo').checked, txt = document.getElementById('txtModo'), card = document.getElementById('cardModo');
        txt.innerText = t ? "MODO: DEVOLUCIÓN 📥" : "MODO: SALIDA 📤";
        txt.style.color = t ? "var(--accent-emerald)" : "var(--accent-amber)";
    }

    function routerEscaneo(codigo) {
        if (isProcessing) return;
        const res = document.getElementById('resultado');
        
        // IDENTIFICAR CARNET
        if (codigo.includes('RUN=') || codigo.length > 70) {
            let rut = "";
            if (codigo.includes('RUN=')) { rut = new URLSearchParams(codigo.split('?')[1]).get('RUN'); }
            else { rut = codigo.substring(0, 9).replace(/^0+/, ''); }
            
            document.getElementById('rut').value = formatearRut(rut);
            res.style.display = "block"; res.style.background = "rgba(99, 102, 241, 0.1)"; res.innerText = "Buscando trabajador...";
            
            fetch('/buscar_trabajador', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({rut: formatearRut(rut), planta: CREDENCIALES.planta, username: CREDENCIALES.user, password: CREDENCIALES.pass}) })
            .then(r => r.json()).then(d => {
                if(d.success) { document.getElementById('trabajador').value = d.nombre; document.getElementById('area').value = d.area; res.innerText = "✅ Trabajador listo."; }
                else { res.innerText = "⚠️ Trabajador nuevo. Rellena área."; }
            });
            return;
        }

        // TRANSACCIÓN
        const rut = document.getElementById('rut').value, tr = document.getElementById('trabajador').value, ar = document.getElementById('area').value;
        const modo = document.getElementById('toggleModo').checked ? 'DEVOLUCION' : 'SALIDA';
        
        if (modo === 'SALIDA' && (!rut || !tr || !ar)) { res.style.display="block"; res.style.background="var(--accent-red)"; res.innerText="⚠️ Falta trabajador"; return; }

        isProcessing = true;
        res.style.display = "block"; res.style.background = "var(--accent-indigo)"; res.innerText = "⏳ Registrando...";
        
        fetch('/registrar_salida', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({accion: modo, rut: rut, trabajador: tr, area: ar, articulo_id: codigo, planta: CREDENCIALES.planta, username: CREDENCIALES.user, password: CREDENCIALES.pass}) })
        .then(r => r.json()).then(d => {
            res.style.background = d.success ? "var(--accent-emerald)" : "var(--accent-red)";
            res.innerText = d.success ? "✅ " + d.message : "❌ " + d.message;
            setTimeout(() => { res.style.display="none"; isProcessing = false; }, 2000);
        });
    }

    function activarLaser() {
        document.getElementById('sec_camara').style.display='none'; document.getElementById('sec_laser').style.display='block';
        if(scanner) scanner.stop();
        document.getElementById('laser_input').focus();
    }

    function activarCamara() {
        document.getElementById('sec_laser').style.display='none'; document.getElementById('sec_camara').style.display='block';
        if(!scanner) scanner = new Html5Qrcode("reader");
        scanner.start({facingMode: "environment"}, {fps:10, qrbox:250}, (txt) => routerEscaneo(txt));
    }

    document.getElementById('laser_input').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') { routerEscaneo(e.target.value); e.target.value = ''; }
    });

    function formatearRut(r) {
        let l = r.replace(/[^0-9kK]/g, '').toUpperCase(); if(l.length<2) return l;
        return l.slice(0,-1).replace(/\B(?=(\d{3})+(?!\d))/g, ".") + "-" + l.slice(-1);
    }
</script>
</body>
</html>

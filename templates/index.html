<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bodega Tuniche - Escáner</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <style>
        body { background-color: #f4f6f7; }
        .navbar { background-color: #2c3e50; }
        #reader { width: 100%; border-radius: 8px; overflow: hidden; margin-bottom: 15px;}
        .laser-box { border: 3px dashed #3498db; background-color: #ebf5fb; font-weight: bold; font-size: 1.2rem;}
        .laser-box:focus { border-color: #2ecc71; box-shadow: 0 0 10px rgba(46, 204, 113, 0.5); background-color: #fff; outline: none;}
        .btn-check:checked + .btn-outline-primary { background-color: #2c3e50; border-color: #2c3e50; color: white;}
        .btn-outline-primary { color: #2c3e50; border-color: #2c3e50;}

        /* --- ESTILOS DEL SWITCH IOS --- */
        .switch-ios { position: relative; display: inline-block; width: 60px; height: 34px; margin: 0; }
        .switch-ios input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #d35400; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #27ae60; }
        input:checked + .slider:before { transform: translateX(26px); }
        
        #textoModo { font-weight: 900; font-size: 1.3rem; transition: color 0.3s; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-3 shadow-sm">
    <div class="container">
        <span class="navbar-brand mb-0 h1">⚙️ Tuniche Móvil</span>
    </div>
</nav>

<div class="container">
    
    <div class="card shadow-sm mb-3 border-start border-5 border-warning" id="cardModo" style="transition: all 0.3s;">
        <div class="card-body d-flex justify-content-between align-items-center py-2">
            <span id="textoModo" style="color: #d35400;">📤 MODO: SALIDA</span>
            <label class="switch-ios">
                <input type="checkbox" id="toggleModo" onchange="cambiarModo()">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="card shadow-sm mb-3">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="card-title text-primary m-0">1. Datos del Trabajador</h5>
                <button class="btn btn-sm btn-primary fw-bold" onclick="activarModoCarnet()">🪪 Leer Carnet</button>
            </div>
            <div class="mb-2">
                <input type="text" id="rut" class="form-control" placeholder="RUT (Ej: 12345678-9)">
            </div>
            <div class="mb-2">
                <input type="text" id="trabajador" class="form-control" placeholder="Nombre completo">
            </div>
            <div class="mb-2">
                <select id="area" class="form-select">
                    <option value="" disabled selected>Seleccione Área...</option>
                    {% for area in areas %}
                    <option value="{{ area }}">{{ area }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-body text-center">
            <h5 class="card-title mb-3">2. Método de Escaneo</h5>
            
            <div class="btn-group w-100 mb-3" role="group">
                <input type="radio" class="btn-check" name="btnradio" id="btn_laser" autocomplete="off" checked onclick="activarLaser()">
                <label class="btn btn-outline-primary btn-sm" for="btn_laser">🔫 Láser</label>
                
                <input type="radio" class="btn-check" name="btnradio" id="btn_cam_trasera" autocomplete="off" onclick="activarCamara('environment')">
                <label class="btn btn-outline-primary btn-sm" for="btn_cam_trasera">📸 Trasera</label>
                
                <input type="radio" class="btn-check" name="btnradio" id="btn_cam_frontal" autocomplete="off" onclick="activarCamara('user')">
                <label class="btn btn-outline-primary btn-sm" for="btn_cam_frontal">🤳 Frontal</label>
            </div>

            <div id="laser_section">
                <p class="text-muted small mb-2">Pon el cursor aquí y dispara el gatillo de la Zebra</p>
                <input type="text" id="laser_input" class="form-control text-center py-3 laser-box" placeholder="[ DISPARA AQUÍ ]" autocomplete="off">
            </div>

            <div id="camara_section" style="display: none;">
                <p class="text-muted small mb-2">Apunta al código QR con la cámara</p>
                <div id="reader"></div>
            </div>
        </div>
    </div>
</div>

<div class="toast-container position-fixed top-0 start-50 translate-middle-x p-3 mt-2" style="z-index: 1055;">
    <div id="notificacionToast" class="toast align-items-center text-white border-0 shadow-lg" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body fw-bold fs-6 text-center w-100" id="toastMensaje">
                </div>
        </div>
    </div>
</div>

<script>
    let isProcessing = false;
    let lastScannedCode = "";
    let html5QrCode; 
    let modoEscaneoCamara = 'ARTICULO'; 

    window.onload = () => {
        html5QrCode = new Html5Qrcode("reader");
        activarLaser(); 
    };

    // --- NUEVA FUNCIÓN: MOSTRAR TOAST ---
    function mostrarNotificacion(mensaje, tipo) {
        const toastEl = document.getElementById('notificacionToast');
        const toastMensaje = document.getElementById('toastMensaje');
        
        // Limpiamos colores anteriores
        toastEl.classList.remove('text-bg-success', 'text-bg-danger', 'text-bg-warning', 'text-bg-info');
        
        // Pintamos según el tipo de mensaje
        if (tipo === 'exito') {
            toastEl.classList.add('text-bg-success');
        } else if (tipo === 'error') {
            toastEl.classList.add('text-bg-danger');
        } else if (tipo === 'alerta') {
            toastEl.classList.add('text-bg-warning', 'text-dark'); // Amarillo con letra oscura
        } else {
            toastEl.classList.add('text-bg-info');
        }

        toastMensaje.innerHTML = mensaje;
        
        // Disparamos la notificación (desaparece sola en 2.5 segundos)
        const toast = new bootstrap.Toast(toastEl, { delay: 2500 });
        toast.show();
    }

    // --- MODO CARNET ---
    function activarModoCarnet() {
        modoEscaneoCamara = 'CARNET';
        document.getElementById('btn_cam_trasera').checked = true;
        activarCamara('environment');
        mostrarNotificacion("📸 Apunta al QR del Carnet...", "info");
    }

    function procesarCarnet(textoLeido) {
        let rutExtraido = "";
        const matchUrl = textoLeido.match(/RUN=([0-9Kk\-]+)/i);
        
        if (matchUrl) {
            rutExtraido = matchUrl[1]; 
        } else {
            let limpio = textoLeido.replace(/[^0-9Kk]/g, '');
            if (limpio.length >= 8) {
                let cuerpo = limpio.slice(0, limpio.length - 1);
                let dv = limpio.slice(-1);
                rutExtraido = cuerpo + "-" + dv;
            }
        }

        if (rutExtraido) {
            vibrarCelular([100]); 
            
            const inputRut = document.getElementById('rut');
            inputRut.value = rutExtraido;
            inputRut.dispatchEvent(new Event('input')); 

            mostrarNotificacion("⏳ Buscando trabajador...", "alerta");

            fetch('/buscar_trabajador', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ rut: inputRut.value })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    document.getElementById('trabajador').value = data.nombre;
                    document.getElementById('area').value = data.area;
                    mostrarNotificacion("✅ ¡Datos cargados! Pistolea el artículo.", "exito");
                } else {
                    mostrarNotificacion("⚠️ RUT nuevo. Escribe su nombre.", "alerta");
                    document.getElementById('trabajador').focus();
                }
                modoEscaneoCamara = 'ARTICULO';
            })
            .catch(() => {
                mostrarNotificacion("❌ Error de internet al buscar RUT.", "error");
                modoEscaneoCamara = 'ARTICULO';
            });

        } else {
            vibrarCelular([300]);
            mostrarNotificacion("❌ No es un Carnet Chileno.", "error");
            setTimeout(() => { modoEscaneoCamara = 'ARTICULO'; }, 2000);
        }
    }

    // --- LÓGICA DEL SWITCH DE MODO ---
    function cambiarModo() {
        const toggle = document.getElementById("toggleModo");
        const texto = document.getElementById("textoModo");
        const cardModo = document.getElementById("cardModo");

        if (toggle.checked) {
            texto.innerText = "📥 MODO: DEVOLUCIÓN";
            texto.style.color = "#27ae60";
            cardModo.classList.remove("border-warning");
            cardModo.classList.add("border-success");
        } else {
            texto.innerText = "📤 MODO: SALIDA";
            texto.style.color = "#d35400";
            cardModo.classList.remove("border-success");
            cardModo.classList.add("border-warning");
        }
        document.getElementById('laser_input').focus();
    }

    // --- AUTOFORMATO DE RUT ---
    const inputRut = document.getElementById('rut');
    inputRut.addEventListener('input', function(e) {
        let valorLimpio = e.target.value.replace(/[^0-9kK]/g, '').toUpperCase();
        if (valorLimpio.length === 0) { e.target.value = ''; return; }
        if (valorLimpio.length > 1) {
            let cuerpo = valorLimpio.slice(0, -1);
            let dv = valorLimpio.slice(-1);
            cuerpo = cuerpo.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
            e.target.value = cuerpo + '-' + dv;
        } else {
            e.target.value = valorLimpio;
        }
    });

    // --- PROCESAMIENTO DE HERRAMIENTA ---
    function procesarEscaneo(codigoLeido) {
        if (isProcessing) return;
        
        const rut = document.getElementById('rut').value;
        const trabajador = document.getElementById('trabajador').value;
        const area = document.getElementById('area').value;
        
        const esDevolucion = document.getElementById('toggleModo').checked;
        const accion = esDevolucion ? 'DEVOLUCION' : 'SALIDA';

        if(accion === 'SALIDA' && (!rut || !trabajador || !area)) {
            mostrarNotificacion("⚠️ Completa los datos para hacer Salida.", "alerta");
            vibrarCelular([300]);
            return;
        }

        isProcessing = true;
        mostrarNotificacion("⏳ Registrando " + accion.toLowerCase() + "...", "alerta");

        fetch('/registrar_salida', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                accion: accion,
                rut: rut,
                trabajador: trabajador,
                area: area,
                articulo_id: codigoLeido
            })
        })
        .then(response => response.json())
        .then(data => {
            if(data.success) {
                mostrarNotificacion("✅ " + data.message, "exito");
                vibrarCelular([100]); 
            } else {
                mostrarNotificacion("❌ " + data.message, "error");
                vibrarCelular([300, 100, 300]); 
            }
            setTimeout(() => { isProcessing = false; }, 1500); 
        })
        .catch(error => {
            mostrarNotificacion("❌ Error de red. Intente de nuevo.", "error");
            isProcessing = false;
        });
    }

    function vibrarCelular(patron) {
        if ("vibrate" in navigator) { navigator.vibrate(patron); }
    }

    // --- LÓGICA DE CÁMARA Y LÁSER ---
    function apagarCamara() {
        return new Promise((resolve) => {
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().then(() => resolve()).catch(() => resolve());
            } else { resolve(); }
        });
    }

    function activarLaser() {
        modoEscaneoCamara = 'ARTICULO'; 
        apagarCamara().then(() => {
            document.getElementById('camara_section').style.display = 'none';
            document.getElementById('laser_section').style.display = 'block';
            setTimeout(() => document.getElementById('laser_input').focus(), 100);
        });
    }

    function activarCamara(modo_lente) {
        apagarCamara().then(() => {
            document.getElementById('laser_section').style.display = 'none';
            document.getElementById('camara_section').style.display = 'block';
            
            html5QrCode.start(
                { facingMode: modo_lente },
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    if (decodedText !== lastScannedCode) {
                        lastScannedCode = decodedText;
                        
                        if (modoEscaneoCamara === 'CARNET') {
                            procesarCarnet(decodedText);
                        } else {
                            procesarEscaneo(decodedText);
                        }
                        setTimeout(() => { lastScannedCode = ""; }, 2000);
                    }
                },
                (errorMessage) => { }
            ).catch((err) => {
                mostrarNotificacion("❌ Permisos de cámara denegados.", "error");
                activarLaser(); 
                document.getElementById('btn_laser').checked = true;
            });
        });
    }

    const laserInput = document.getElementById('laser_input');
    laserInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault(); 
            const codigo = laserInput.value.trim();
            if(codigo) {
                procesarEscaneo(codigo);
                laserInput.value = ''; 
                laserInput.focus();    
            }
        }
    });
</script>

</body>
</html>

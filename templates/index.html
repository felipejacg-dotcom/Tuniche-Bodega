<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bodega Tuniche - Escáner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body { background-color: #f4f6f7; }
        .navbar { background-color: #2c3e50; }
        #reader { width: 100%; border-radius: 8px; overflow: hidden; margin-bottom: 15px;}
        .laser-box { border: 3px dashed #3498db; background-color: #ebf5fb; font-weight: bold; font-size: 1.2rem;}
        .laser-box:focus { border-color: #2ecc71; box-shadow: 0 0 10px rgba(46, 204, 113, 0.5); background-color: #fff; outline: none;}
        /* Estilo para los botones de selección */
        .btn-check:checked + .btn-outline-primary { background-color: #2c3e50; border-color: #2c3e50; color: white;}
        .btn-outline-primary { color: #2c3e50; border-color: #2c3e50;}
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-3 shadow-sm">
    <div class="container">
        <span class="navbar-brand mb-0 h1">⚙️ Tuniche Móvil</span>
    </div>
</nav>

<div class="container">
    <div class="card shadow-sm mb-3">
        <div class="card-body">
            <h5 class="card-title text-primary">1. Datos del Trabajador</h5>
            <div class="mb-2">
                <input type="text" id="rut" class="form-control" placeholder="RUT (Ej: 12345678-9)">
            </div>
            <div class="mb-2">
                <input type="text" id="trabajador" class="form-control" placeholder="Nombre completo">
            </div>
            <div class="mb-2">
                <select id="area" class="form-select">
                    <option value="" disabled selected>Seleccione Área...</option>
                    {% for area in areas %}
                    <option value="{{ area }}">{{ area }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-body text-center">
            <h5 class="card-title mb-3">2. Método de Escaneo</h5>
            
            <div class="btn-group w-100 mb-3" role="group">
                <input type="radio" class="btn-check" name="btnradio" id="btn_laser" autocomplete="off" checked onclick="activarLaser()">
                <label class="btn btn-outline-primary btn-sm" for="btn_laser">🔫 Láser</label>
              
                <input type="radio" class="btn-check" name="btnradio" id="btn_cam_trasera" autocomplete="off" onclick="activarCamara('environment')">
                <label class="btn btn-outline-primary btn-sm" for="btn_cam_trasera">📸 Trasera</label>
              
                <input type="radio" class="btn-check" name="btnradio" id="btn_cam_frontal" autocomplete="off" onclick="activarCamara('user')">
                <label class="btn btn-outline-primary btn-sm" for="btn_cam_frontal">🤳 Frontal</label>
            </div>

            <div id="laser_section">
                <p class="text-muted small mb-2">Pon el cursor aquí y dispara el gatillo de la Zebra</p>
                <input type="text" id="laser_input" class="form-control text-center py-3 laser-box" placeholder="[ DISPARA AQUÍ ]" autocomplete="off">
            </div>

            <div id="camara_section" style="display: none;">
                <p class="text-muted small mb-2">Apunta al código QR con la cámara</p>
                <div id="reader"></div>
            </div>
            
            <div id="resultado" class="alert alert-secondary mt-3 p-2" style="display:none;">
                Esperando escaneo...
            </div>
        </div>
    </div>
</div>

<script>
    let isProcessing = false;
    let lastScannedCode = "";
    let html5QrCode; // Variable global para la cámara

    // Al cargar la página, preparamos el motor de la cámara pero no lo encendemos
    window.onload = () => {
        html5QrCode = new Html5Qrcode("reader");
        activarLaser(); // Empezamos siempre con el láser activado
    };

    // --- AUTOFORMATO DE RUT (Puntos y Guion) ---
    const inputRut = document.getElementById('rut');
    inputRut.addEventListener('input', function(e) {
        // 1. Limpiar todo lo que no sea número o la letra K
        let valorLimpio = e.target.value.replace(/[^0-9kK]/g, '').toUpperCase();
        
        if (valorLimpio.length === 0) {
            e.target.value = '';
            return;
        }
        
        // 2. Separar el cuerpo del dígito verificador
        if (valorLimpio.length > 1) {
            let cuerpo = valorLimpio.slice(0, -1);
            let dv = valorLimpio.slice(-1);
            
            // 3. Ponerle los puntos al cuerpo cada 3 números
            cuerpo = cuerpo.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
            
            // 4. Juntarlo todo con el guion
            e.target.value = cuerpo + '-' + dv;
        } else {
            e.target.value = valorLimpio;
        }
    });

    // Función principal que envía el dato a la base de datos
    function procesarEscaneo(codigoLeido) {
        if (isProcessing) return;
        
        const rut = document.getElementById('rut').value;
        const trabajador = document.getElementById('trabajador').value;
        const area = document.getElementById('area').value;
        const resDiv = document.getElementById('resultado');

        if(!rut || !trabajador || !area) {
            resDiv.style.display = "block";
            resDiv.className = "alert alert-warning mt-3 p-2 font-weight-bold";
            resDiv.innerText = "⚠️ Completa RUT, Nombre y Área primero.";
            return;
        }

        isProcessing = true;
        resDiv.style.display = "block";
        resDiv.className = "alert alert-warning mt-3 p-2";
        resDiv.innerText = "⏳ Registrando salida...";

        fetch('/registrar_salida', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                rut: rut,
                trabajador: trabajador,
                area: area,
                articulo_id: codigoLeido
            })
        })
        .then(response => response.json())
        .then(data => {
            if(data.success) {
                resDiv.className = "alert alert-success mt-3 p-2";
                resDiv.innerHTML = "<strong>✅ " + data.message + "</strong>";
            } else {
                resDiv.className = "alert alert-danger mt-3 p-2";
                resDiv.innerHTML = "<strong>❌ " + data.message + "</strong>";
            }
            
            setTimeout(() => { 
                isProcessing = false; 
                resDiv.className = "alert alert-secondary mt-3 p-2";
                resDiv.innerText = "Listo para el siguiente...";
            }, 1500); 
        })
        .catch(error => {
            console.error('Error:', error);
            resDiv.className = "alert alert-danger mt-3 p-2";
            resDiv.innerText = "❌ Error de red.";
            isProcessing = false;
        });
    }

    // --- LÓGICA DE INTERFAZ Y CÁMARA ---

    function apagarCamara() {
        return new Promise((resolve) => {
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().then(() => resolve()).catch(() => resolve());
            } else {
                resolve();
            }
        });
    }

    function activarLaser() {
        apagarCamara().then(() => {
            document.getElementById('camara_section').style.display = 'none';
            document.getElementById('laser_section').style.display = 'block';
            setTimeout(() => document.getElementById('laser_input').focus(), 100);
        });
    }

    function activarCamara(modo_lente) {
        apagarCamara().then(() => {
            document.getElementById('laser_section').style.display = 'none';
            document.getElementById('camara_section').style.display = 'block';
            
            html5QrCode.start(
                { facingMode: modo_lente }, // "environment" para trasera, "user" para frontal
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    if (decodedText !== lastScannedCode) {
                        lastScannedCode = decodedText;
                        procesarEscaneo(decodedText);
                        setTimeout(() => { lastScannedCode = ""; }, 2000);
                    }
                },
                (errorMessage) => { /* Ignorar errores de lectura en tiempo real */ }
            ).catch((err) => {
                alert("Error al iniciar la cámara: " + err);
                activarLaser(); // Si falla, volvemos al modo láser por seguridad
                document.getElementById('btn_laser').checked = true;
            });
        });
    }

    // --- CAPTURA DEL DISPARO LÁSER ---
    const laserInput = document.getElementById('laser_input');
    laserInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault(); 
            const codigo = laserInput.value.trim();
            if(codigo) {
                procesarEscaneo(codigo);
                laserInput.value = ''; 
                laserInput.focus();    
            }
        }
    });

</script>

</body>
</html>

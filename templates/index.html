<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGB Móvil - Tuniche Fruits</title>
    
    <style>
        :root {
            --color-salida: #d35400; /* Naranjo */
            --color-devolucion: #27ae60; /* Verde */
            --bg-color: #ecf0f1;
            --text-dark: #2c3e50;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body { background-color: var(--bg-color); color: var(--text-dark); display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        /* Cabecera Corporativa */
        .header { background-color: var(--text-dark); color: white; width: 100%; padding: 20px; text-align: center; font-size: 1.5rem; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }

        /* Contenedor Principal */
        .main-container { width: 100%; max-width: 500px; padding: 20px; display: flex; flex-direction: column; gap: 20px; margin-top: 10px; }

        /* Panel del Switch */
        .panel-switch { display: flex; align-items: center; justify-content: center; gap: 15px; background-color: #ffffff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-left: 8px solid var(--color-salida); transition: border-color 0.3s; }
        .panel-switch.modo-dev { border-left-color: var(--color-devolucion); }

        #textoModo { font-size: 1.4rem; font-weight: 900; transition: color 0.3s ease; letter-spacing: 1px; }
        .modo-salida { color: var(--color-salida); }
        .modo-devolucion { color: var(--color-devolucion); }

        /* Switch iOS */
        .switch-ios { position: relative; display: inline-block; width: 70px; height: 38px; }
        .switch-ios input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--color-salida); transition: .4s; border-radius: 38px; }
        .slider:before { position: absolute; content: ""; height: 30px; width: 30px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        input:checked + .slider { background-color: var(--color-devolucion); }
        input:checked + .slider:before { transform: translateX(32px); }

        /* Tarjeta de Escaneo */
        .card-scan { background-color: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 15px; }
        
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-weight: bold; font-size: 1.1rem; color: #7f8c8d; }
        
        input[type="text"] { width: 100%; padding: 15px; font-size: 1.2rem; border: 2px solid #bdc3c7; border-radius: 8px; transition: border-color 0.3s; text-align: center; font-weight: bold; }
        input[type="text"]:focus { outline: none; border-color: #3498db; box-shadow: 0 0 8px rgba(52, 152, 219, 0.3); }
        
        /* Input especial para la Zebra */
        #codigoArticulo { border-color: var(--text-dark); background-color: #f8f9fa; font-size: 1.4rem; letter-spacing: 2px; }
        #codigoArticulo:focus { border-color: var(--color-salida); background-color: #fff; }
        .card-scan.modo-dev #codigoArticulo:focus { border-color: var(--color-devolucion); }

        /* Mensajes de Alerta */
        .alerta { display: none; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 1.1rem; margin-top: 10px; animation: fadeIn 0.3s; }
        .alerta.exito { display: block; background-color: #d5f5e3; color: #27ae60; border: 1px solid #27ae60; }
        .alerta.error { display: block; background-color: #fadbd8; color: #c0392b; border: 1px solid #c0392b; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header">
        📦 SGB Móvil - Tuniche
    </div>

    <div class="main-container">
        
        <div class="panel-switch" id="panelSwitch">
            <label class="switch-ios">
                <input type="checkbox" id="toggleModo" onchange="cambiarModo()">
                <span class="slider"></span>
            </label>
            <div id="textoModo" class="modo-salida">📤 SALIDA</div>
        </div>

        <div class="card-scan" id="tarjetaScan">
            <div class="input-group">
                <label for="rutTrabajador">1. RUT Trabajador (Opcional en Devolución):</label>
                <input type="text" id="rutTrabajador" placeholder="Ej: 12345678-9" autocomplete="off">
            </div>

            <div class="input-group" style="margin-top: 15px;">
                <label for="codigoArticulo">2. Pistolear Código QR:</label>
                <input type="text" id="codigoArticulo" placeholder="Escanear aquí..." autofocus autocomplete="off">
            </div>
        </div>

        <div id="mensajeAlerta" class="alerta"></div>

    </div>

    <script>
        // 1. Lógica del Switch de Modo
        function cambiarModo() {
            const toggle = document.getElementById("toggleModo");
            const texto = document.getElementById("textoModo");
            const panel = document.getElementById("panelSwitch");
            const tarjeta = document.getElementById("tarjetaScan");
            const inputCodigo = document.getElementById("codigoArticulo");

            if (toggle.checked) {
                // Modo Devolución
                texto.innerText = "📥 DEVOLUCIÓN";
                texto.className = "modo-devolucion";
                panel.classList.add("modo-dev");
                tarjeta.classList.add("modo-dev");
            } else {
                // Modo Salida
                texto.innerText = "📤 SALIDA";
                texto.className = "modo-salida";
                panel.classList.remove("modo-dev");
                tarjeta.classList.remove("modo-dev");
            }
            
            // Regresar el foco al escáner para no perder tiempo
            inputCodigo.focus();
        }

        // 2. Lógica del Escáner (Zebra o Teclado)
        const inputCodigo = document.getElementById("codigoArticulo");
        const inputRut = document.getElementById("rutTrabajador");
        const mensajeAlerta = document.getElementById("mensajeAlerta");

        // Escuchamos cuando la Zebra presiona "Enter" automáticamente después de leer el QR
        inputCodigo.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault(); // Evitamos que la página se recargue
                procesarEscaneo();
            }
        });

        function procesarEscaneo() {
            const codigo = inputCodigo.value.trim();
            const rut = inputRut.value.trim();
            const esDevolucion = document.getElementById("toggleModo").checked;
            const accion = esDevolucion ? "DEVOLUCION" : "SALIDA";

            // Validaciones rápidas
            if (codigo === "") return;
            if (!esDevolucion && rut === "") {
                mostrarAlerta("❌ Debe ingresar el RUT para registrar una salida.", "error");
                vibrarCelular([300, 100, 300]); // Vibración de error doble
                return;
            }

            mostrarAlerta("⏳ Procesando...", "");

            // Preparamos los datos para enviarlos al servidor Python en Render
            const datos = {
                accion: accion,
                codigo_qr: codigo,
                rut: rut
            };

            // AQUÍ LLAMAS A TU SERVIDOR RENDER (Ajusta la URL '/api/escanear' por la tuya)
            fetch('/api/escanear', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            })
            .then(response => response.json())
            .then(data => {
                if(data.status === "success") {
                    mostrarAlerta(`✅ ¡Éxito! ${accion} registrada.`, "exito");
                    vibrarCelular([100]); // Vibración corta de éxito
                    inputCodigo.value = ""; // Limpiamos para el siguiente escaneo
                } else {
                    mostrarAlerta(`❌ Error: ${data.message}`, "error");
                    vibrarCelular([300, 100, 300]); 
                    inputCodigo.value = "";
                }
            })
            .catch(error => {
                console.error('Error:', error);
                mostrarAlerta("⚠️ Problema de conexión. Revise su internet.", "error");
                vibrarCelular([500]); // Vibración larga de falla técnica
            });

            // Forzar el foco de vuelta al escáner siempre
            setTimeout(() => inputCodigo.focus(), 100);
        }

        // 3. Funciones de Apoyo (Feedback Táctil y Visual)
        function mostrarAlerta(texto, tipo) {
            mensajeAlerta.className = "alerta"; // Reset
            mensajeAlerta.innerText = texto;
            if (tipo) {
                mensajeAlerta.classList.add(tipo);
            }
        }

        function vibrarCelular(patron) {
            // Verifica si el celular soporta vibración nativa
            if ("vibrate" in navigator) {
                navigator.vibrate(patron);
            }
        }

        // Mantener el cursor bloqueado en el input para que la Zebra nunca falle
        document.addEventListener('click', function(e) {
            if(e.target.id !== 'rutTrabajador' && e.target.id !== 'toggleModo') {
                inputCodigo.focus();
            }
        });
    </script>
</body>
</html>
